<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantauan Gempa Real-time</title>
    
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS untuk Peta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Kustomisasi scrollbar untuk sidebar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
        
        /* Animasi pulse untuk indikator live */
        .live-indicator {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-house-crack text-orange-500 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wide">Info Gempa<span class="text-orange-500">Global</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-sm text-gray-400">
                <span class="w-3 h-3 bg-red-500 rounded-full live-indicator"></span>
                <span>Live Data (USGS)</span>
            </div>
            <button id="refreshBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                <i class="fa-solid fa-arrows-rotate"></i> Perbarui
            </button>
        </div>
    </header>

    <!-- Kontainer Utama -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Overlay Loading -->
        <div id="loadingOverlay" class="absolute inset-0 bg-gray-900/80 z-50 flex flex-col justify-center items-center hidden">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-orange-500 mb-3"></i>
            <p class="text-gray-300">Mengambil data gempa terbaru...</p>
        </div>

        <!-- Sidebar Daftar Gempa -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-gray-800 flex flex-col h-[40vh] md:h-full border-r border-gray-700">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800 sticky top-0">
                <h2 class="font-semibold text-gray-200">Gempa Terbaru (Hari Ini)</h2>
                <select id="magFilter" class="bg-gray-700 border border-gray-600 text-white text-xs rounded p-1 focus:outline-none focus:border-orange-500">
                    <option value="all">Semua Magnitudo</option>
                    <option value="3">Mag > 3.0</option>
                    <option value="4">Mag > 4.0</option>
                    <option value="5">Mag > 5.0</option>
                </select>
            </div>
            
            <div id="earthquakeList" class="flex-1 overflow-y-auto p-2 space-y-2">
                <!-- Item gempa akan dimuat di sini oleh JavaScript -->
            </div>
            
            <div class="p-3 bg-gray-900 text-xs text-gray-500 text-center border-t border-gray-700">
                Data bersumber dari <a href="https://earthquake.usgs.gov/" target="_blank" class="text-orange-400 hover:underline">USGS</a>
            </div>
        </aside>

        <!-- Area Peta -->
        <div id="map" class="w-full md:w-2/3 lg:w-3/4 h-[60vh] md:h-full z-0"></div>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Konfigurasi URL API USGS (Gempa seluruh dunia dalam 24 jam terakhir)
        const API_URL = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson';
        
        let map;
        let earthquakeLayerGroup = L.layerGroup();
        let earthquakeData = [];

        // Inisialisasi Peta
        function initMap() {
            // Set fokus awal ke wilayah Indonesia
            map = L.map('map').setView([-2.5489, 118.0149], 5);

            // Menggunakan basemap mode gelap dari CartoDB
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            earthquakeLayerGroup.addTo(map);
        }

        // Fungsi untuk menentukan warna berdasarkan kekuatan gempa (Magnitudo)
        function getColor(magnitude) {
            if (magnitude >= 6.0) return '#dc2626'; // Merah tua (Bahaya)
            if (magnitude >= 5.0) return '#ef4444'; // Merah
            if (magnitude >= 4.0) return '#f97316'; // Oranye
            if (magnitude >= 3.0) return '#eab308'; // Kuning
            return '#22c55e'; // Hijau (Ringan)
        }

        // Fungsi untuk format waktu menjadi waktu lokal yang mudah dibaca
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('id-ID', {
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            }) + ' WIB'; // Asumsi ditampilkan dalam waktu lokal pengguna (browser)
        }

        // Fungsi untuk format waktu relatif (misal: "10 menit yang lalu")
        function getRelativeTime(timestamp) {
            const rtf = new Intl.RelativeTimeFormat('id', { numeric: 'auto' });
            const daysDifference = Math.round((timestamp - new Date().getTime()) / (1000 * 60 * 60 * 24));
            const hoursDifference = Math.round((timestamp - new Date().getTime()) / (1000 * 60 * 60));
            const minutesDifference = Math.round((timestamp - new Date().getTime()) / (1000 * 60));

            if (Math.abs(minutesDifference) < 60) return rtf.format(minutesDifference, 'minute');
            if (Math.abs(hoursDifference) < 24) return rtf.format(hoursDifference, 'hour');
            return rtf.format(daysDifference, 'day');
        }

        // Mengambil data dari API
        async function fetchEarthquakeData() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            const refreshBtnIcon = document.querySelector('#refreshBtn i');
            
            try {
                loadingOverlay.classList.remove('hidden');
                refreshBtnIcon.classList.add('fa-spin');

                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Simpan data ke variabel global dan urutkan dari yang terbaru
                earthquakeData = data.features.sort((a, b) => b.properties.time - a.properties.time);
                
                renderData();

            } catch (error) {
                console.error("Gagal mengambil data:", error);
                alert("Gagal mengambil data gempa. Periksa koneksi internet Anda.");
            } finally {
                loadingOverlay.classList.add('hidden');
                refreshBtnIcon.classList.remove('fa-spin');
            }
        }

        // Menampilkan data ke Peta dan Sidebar
        function renderData() {
            const listContainer = document.getElementById('earthquakeList');
            const filterValue = document.getElementById('magFilter').value;
            
            // Bersihkan marker lama & list lama
            earthquakeLayerGroup.clearLayers();
            listContainer.innerHTML = '';

            let displayedCount = 0;

            earthquakeData.forEach((quake, index) => {
                const mag = quake.properties.mag;
                const place = quake.properties.place;
                const time = quake.properties.time;
                const depth = quake.geometry.coordinates[2];
                const coords = [quake.geometry.coordinates[1], quake.geometry.coordinates[0]]; // Lat, Lng
                const url = quake.properties.url;

                // Terapkan Filter
                if (filterValue !== 'all' && mag < parseFloat(filterValue)) return;

                displayedCount++;

                // 1. Tambahkan ke Peta
                const markerColor = getColor(mag);
                const radiusSize = Math.max(mag * 3, 5); // Ukuran lingkaran berdasarkan magnitudo

                const circleMarker = L.circleMarker(coords, {
                    radius: radiusSize,
                    fillColor: markerColor,
                    color: '#000',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });

                // Popup ketika marker diklik
                const popupContent = `
                    <div class="text-gray-800 font-sans">
                        <h3 class="font-bold text-lg mb-1 border-b pb-1">Magnitudo ${mag.toFixed(1)}</h3>
                        <p class="text-sm mb-1"><i class="fa-solid fa-location-dot text-red-500 w-4"></i> ${place}</p>
                        <p class="text-sm mb-1"><i class="fa-solid fa-clock text-blue-500 w-4"></i> ${formatTime(time)}</p>
                        <p class="text-sm mb-2"><i class="fa-solid fa-arrow-down text-gray-500 w-4"></i> Kedalaman: ${depth.toFixed(1)} km</p>
                        <a href="${url}" target="_blank" class="text-xs bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700 block text-center mt-2">Detail di USGS</a>
                    </div>
                `;
                circleMarker.bindPopup(popupContent);
                earthquakeLayerGroup.addLayer(circleMarker);

                // 2. Tambahkan ke Sidebar (hanya tampilkan 50 terbaru untuk performa)
                if (displayedCount <= 50) {
                    const listItem = document.createElement('div');
                    listItem.className = 'bg-gray-700 hover:bg-gray-600 rounded-lg p-3 cursor-pointer transition border-l-4 shadow-sm';
                    listItem.style.borderLeftColor = markerColor;
                    
                    listItem.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-lg" style="color: ${markerColor}">M ${mag.toFixed(1)}</span>
                            <span class="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full">${getRelativeTime(time)}</span>
                        </div>
                        <p class="text-sm text-gray-200 font-medium leading-tight mb-2">${place}</p>
                        <div class="flex justify-between text-xs text-gray-400">
                            <span><i class="fa-solid fa-water"></i> ${depth.toFixed(0)} km</span>
                            <span>${formatTime(time).split(' ')[1]}</span>
                        </div>
                    `;

                    // Klik list untuk fokus ke lokasi di peta
                    listItem.addEventListener('click', () => {
                        map.flyTo(coords, 7, { duration: 1.5 });
                        circleMarker.openPopup();
                        
                        // Highlight efek untuk HP
                        if(window.innerWidth < 768) {
                           window.scrollTo({ top: document.getElementById('map').offsetTop, behavior: 'smooth' });
                        }
                    });

                    listContainer.appendChild(listItem);
                }
            });

            if (displayedCount === 0) {
                listContainer.innerHTML = `
                    <div class="text-center p-6 text-gray-500">
                        <i class="fa-solid fa-satellite-dish text-3xl mb-2 opacity-50"></i>
                        <p>Tidak ada data gempa sesuai filter.</p>
                    </div>`;
            }
        }

        // Event Listeners
        document.getElementById('refreshBtn').addEventListener('click', fetchEarthquakeData);
        document.getElementById('magFilter').addEventListener('change', renderData);

        // Inisialisasi awal saat halaman dimuat
        window.onload = () => {
            initMap();
            fetchEarthquakeData();
            
            // Auto refresh setiap 5 menit (300.000 ms)
            setInterval(fetchEarthquakeData, 300000);
        };
    </script>
</body>
</html>
